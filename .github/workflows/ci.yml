name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22.13.0"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Test production build
        run: npm test
      - name: Lint
        run: npm run lint
