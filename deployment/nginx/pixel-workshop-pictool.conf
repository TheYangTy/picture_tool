# Include this file inside the HTTPS server block for yangtianyu.cloud.
# The build must use PUBLIC_BASE_PATH=/pictool/ so assets stay namespaced.

location = /pictool {
    return 301 /pictool/;
}

location ^~ /pictool/ {
    rewrite ^/pictool/(.*)$ /$1 break;
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /pictool;
    proxy_connect_timeout 10s;
    proxy_read_timeout 60s;
}
